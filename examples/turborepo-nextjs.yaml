# Turborepo + Next.js 專案配置範例
# 適用於 Turborepo + Yarn/PNPM Workspace 架構

# ============================================
# 基本資訊
# ============================================
project_name: "my-turborepo-app"
framework: "nextjs-15-app-router"
language: "typescript"
issue_prefix: "BUG"

# ============================================
# Monorepo 配置
# ============================================
monorepo:
  tool: "turborepo"
  main_workspace: "web"
  workspaces:
    - "apps/*"
    - "packages/*"

# ============================================
# 路徑配置
# ============================================
paths:
  root: "../my-turborepo-app"

  shared_packages:
    - "packages/ui/"
    - "packages/utils/"

  shared_components:
    - "apps/web/src/components/"
    - "apps/web/src/hooks/"
    - "apps/web/src/lib/"

  isolated_modules:
    - "apps/web/src/app/"

  domain_logic:
    - "apps/web/src/domain/"
    - "apps/web/src/stores/"

# ============================================
# 高風險關鍵字
# ============================================
high_risk_keywords:
  - "auth"
  - "middleware"
  - "store"
  - "websocket"

# ============================================
# 品質檢查命令
# ============================================
quality_checks:
  typescript:
    command: "yarn workspace web tsc --noEmit"
    enabled: true

  eslint:
    command: "yarn workspace web lint"
    enabled: true

  prettier:
    command: "yarn prettier --check ."
    enabled: true

  tests:
    command: "yarn workspace web test"
    enabled: false

# ============================================
# 程式碼規範
# ============================================
coding_standards:
  naming:
    variables: "camelCase"
    functions: "camelCase"
    constants: "UPPER_CASE"
    components: "PascalCase"
    types: "PascalCase"

  file_patterns:
    view_controller: "*.view-controller.tsx"
    view_model: "*.view-model.ts"
    schema: "*.schema.ts"
    usecase: "*.usecase.ts"
    repository: "*.repo.ts"

# ============================================
# Issue 來源配置
# ============================================
issue_source:
  type: local_json  # 從 issues/sources/<id>.json 讀取
  options: {}

# ============================================
# Skills 配置（留空使用內建 skills/）
# ============================================
skills:
  directories: []
  coding_standards_skill: null  # 可選：填入對應的 skill 名稱（如 vercel-react-best-practices）

# ============================================
# 開發伺服器配置
# ============================================
dev_server:
  port: 3000
  command: "yarn workspace web dev"
